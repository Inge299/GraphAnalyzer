services:
  postgres:
    image: postgres:15-alpine
    container_name: osint-postgres
    environment:
      POSTGRES_USER: osint_user
      POSTGRES_PASSWORD: osint_password
      POSTGRES_DB: osint_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osint_user -d osint_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - osint-network

  redis:
    image: redis:7-alpine
    container_name: osint-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - osint-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osint-app
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://osint_user:osint_password@postgres:5432/osint_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-for-development
      - ENVIRONMENT=development
      - POSTGRES_USER=osint_user
      - POSTGRES_PASSWORD=osint_password
      - POSTGRES_DB=osint_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - osint-network
    volumes:
      - ./plugins:/app/plugins
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  inference:
    build:
      context: .
      dockerfile: inference_service/Dockerfile
    container_name: osint-inference
    ports:
      - "8001:8001"
    environment:
      - EMBEDDING_MODEL=BAAI/bge-m3
      - RERANK_MODEL=BAAI/bge-reranker-v2-m3
      - DEVICE=cuda
      - PRELOAD_MODELS=true
      - BATCH_SIZE=16
      - TOP_K_DEFAULT=10
      - HF_HOME=/models/hf-cache
      - TRANSFORMERS_CACHE=/models/hf-cache
    volumes:
      - ./data/models:/models
    networks:
      - osint-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  pgadmin:
    image: dpage/pgadmin4
    container_name: osint-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - osint-network

networks:
  osint-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:



